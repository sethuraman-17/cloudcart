version: '3.8'

services:
  postgres-db:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_DB: cloudcart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2163
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cloudcart-app:
    build: .
    container_name: cloudcart-app
    depends_on:
      - postgres-db
    ports:
      - "9091:9090"

volumes:
  postgres_data: